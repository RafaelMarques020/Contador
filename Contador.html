<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Truco ♧♡♤♢</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: black;
            margin: 0;
            color: white;
        }

        .container-truco {
            background: 
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url(https://media.istockphoto.com/id/1359146544/vector/poker-and-casino-playing-card-black-background.jpg?s=612x612&w=0&k=20&c=ib1nexrw8lb9Uc0xsyIyqukR-SS_o18lFI6wTgWo7N0=)
                no-repeat center/cover;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 600px;
            width: 95%;
        }

        .pontuacao {
            font-size: 4em;
            margin: 5px 0;
            font-weight: bold;
            color: #ffc107;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .botoes-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .botao {
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: 0.2s;
            min-width: 55px;
        }

        .aumentar { background-color: #4CAF50; color: white; }
        .aumentar:active { background-color: white; color: #4CAF50; transform: scale(0.95); }

        .diminuir { background-color: #f44336; color: white; }
        .diminuir:active { background-color: white; color: #f44336; transform: scale(0.95); }

        .reset { 
            background-color: #007bff; 
            color: white; 
            margin-top: 25px; 
            width: 100%; 
            font-size: 1.2em; 
            text-transform: uppercase;
        }

        #subtitulo { 
            margin-top: 30px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            padding-top: 20px; 
        }
        
        .vitoria-numero { 
            font-size: 2em; 
            font-weight: bold; 
            color: #0dcaf0; 
        }

        h1 { font-size: 1.8rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container-truco">  
        <h1>Truco ♧♡♤♢</h1>
        
        <div class="row">
            <div class="col-6 border-end border-secondary">
                <h2 class="h4">Nós</h2>
                <p class="pontuacao" id="pontuacaoA">0</p>
                <div class="botoes-grid">
                    <button class="botao aumentar" onclick="aumentarPlacar('A', 1)">+1</button>
                    <button class="botao aumentar" onclick="aumentarPlacar('A', 3)">+3</button>
                    <button class="botao aumentar" onclick="aumentarPlacar('A', 6)">+6</button>
                    <button class="botao aumentar" onclick="aumentarPlacar('A', 9)">+9</button>
                    <button class="botao aumentar" onclick="aumentarPlacar('A', 12)">+12</button>
                    <button class="botao diminuir" onclick="aumentarPlacar('A', -1)">-1</button>
                </div>
            </div>

            <div class="col-6">
                <h2 class="h4">Eles</h2>
                <p class="pontuacao" id="pontuacaoB">0</p>
                <div class="botoes-grid">
                    <button class="botao aumentar" onclick="aumentarPlacar('B', 1)">+1</button>
                    <button class="botao aumentar" onclick="aumentarPlacar('B', 3)">+3</button>
                    <button class="botao aumentar" onclick="aumentarPlacar('B', 6)">+6</button>
                    <button class="botao aumentar" onclick="aumentarPlacar('B', 9)">+9</button>
                    <button class="botao aumentar" onclick="aumentarPlacar('B', 12)">+12</button>
                    <button class="botao diminuir" onclick="aumentarPlacar('B', -1)">-1</button>
                </div>
            </div>
        </div>

        <button class="botao reset" onclick="reiniciar()">Zerar Partida</button>

        <div class="row" id="subtitulo">
            <h3 class="h5 mb-3 text-secondary">Marcador de Vitórias</h3>
            <div class="col-6">
                <p class="mb-0">Nós</p>
                <p class="vitoria-numero" id="vitoriasA">0</p>
            </div>            
            <div class="col-6">
                <p class="mb-0">Eles</p>
                <p class="vitoria-numero" id="vitoriasB">0</p>
            </div>
        </div>
    </div>

    <script>
        let pontuacaoDupla1 = 0;
        let pontuacaoDupla2 = 0;
        let marcadorDeVitoriasA = 0;
        let marcadorDeVitoriasB = 0;
        const limiteDePontos = 12;

        const displayPlacarA = document.getElementById("pontuacaoA");
        const displayPlacarB = document.getElementById("pontuacaoB");
        const displayVitoriasA = document.getElementById("vitoriasA");
        const displayVitoriasB = document.getElementById("vitoriasB");

        function atualizarTela() {
            displayPlacarA.textContent = pontuacaoDupla1;
            displayPlacarB.textContent = pontuacaoDupla2;
            displayVitoriasA.textContent = marcadorDeVitoriasA;
            displayVitoriasB.textContent = marcadorDeVitoriasB;
        }

        function reiniciar() {
            console.log("Reiniciando placar...");
            pontuacaoDupla1 = 0;
            pontuacaoDupla2 = 0;
            atualizarTela();
        }

        function aumentarPlacar(time, pontos) {
            if (time === 'A') {
                pontuacaoDupla1 += pontos;
                if (pontuacaoDupla1 < 0) pontuacaoDupla1 = 0;
            } else {
                pontuacaoDupla2 += pontos;
                if (pontuacaoDupla2 < 0) pontuacaoDupla2 = 0;
            }

            atualizarTela();

            if (pontuacaoDupla1 >= limiteDePontos) {
                alert("🎉 VITÓRIA PARA NÓS!");
                marcadorDeVitoriasA++;
                reiniciar();
            } 
            else if (pontuacaoDupla2 >= limiteDePontos) {
                alert("🃏 VITÓRIA PARA ELES!");
                marcadorDeVitoriasB++;
                reiniciar();
            }
        }

        atualizarTela();
    </script>
</body>
</html>
